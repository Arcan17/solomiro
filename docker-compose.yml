version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: solomiro
      POSTGRES_PASSWORD: solomiro
      POSTGRES_DB: solomiro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solomiro"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/data:/app/data

volumes:
  pgdata:
